<!doctype html>
<!-- Standalone preview of the drag-and-drop canvas. No install needed:
     just open this file in a browser (internet required for the X6 CDN script). -->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Block Diagram Builder - Standalone Demo</title>
<script src="https://cdn.jsdelivr.net/npm/@antv/x6@2.18.1/dist/index.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@antv/x6-plugin-transform@2.1.8/dist/index.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: #141518; color: #ececef; }
  .layout { display: flex; height: 100vh; }
  .palette {
    width: clamp(185px, 18vw, 250px); padding: 12px; background: #1d1e23;
    border-right: 1px solid #2b2c32; overflow-y: auto;
  }
  .logo-bar { display: flex; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 2px solid #f5a623; }
  .tabs { display: flex; gap: 4px; margin-bottom: 12px; background: #0e0f11; border-radius: 8px; padding: 3px; }
  .tab {
    flex: 1; padding: 6px 2px; font-size: 11px; font-weight: 600; border: none;
    border-radius: 6px; background: transparent; color: #9b9ca4; cursor: pointer;
  }
  .tab:hover { background: #26272d; }
  .tab.active { background: #26272d; color: #f5a623; box-shadow: 0 1px 4px rgba(0,0,0,.4); }
  #palette-items { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .palette-item {
    padding: 9px 4px 7px; border-radius: 9px; color: #fff;
    font-size: 13px; font-weight: 500; cursor: grab; user-select: none;
    text-align: center; border: 1px solid #2b2c32; background: #0e0f11;
    transition: border-color .15s, transform .1s;
  }
  .palette-item:hover { border-color: #f5a623; transform: translateY(-1px); }
  .palette-item.block-chip { grid-column: 1 / -1; border: 1px solid rgba(255,255,255,.22); }
  .hint { font-size: 11px; color: #6b6c74; line-height: 1.5; margin-top: 12px; }
  #canvas { flex: 1; min-width: 0; }
  @media (max-width: 680px) { .palette { width: 150px; padding: 8px; } #palette-items { grid-template-columns: 1fr; } }
  @keyframes flowing-line { to { stroke-dashoffset: -1000; } }
  .x6-node .x6-port { opacity: 0; transition: opacity .12s ease; }
  .x6-node:hover .x6-port { opacity: 1; }
  /* White canvas mode: remap default light strokes to dark slate */
  .canvas-light [stroke="#e2e8f0"] { stroke: #334155; }
  .canvas-light [fill="#e2e8f0"]   { fill: #334155; }
  .canvas-light text[fill="#94a3b8"] { fill: #475569; }
  .canvas-light [fill="#0f172a"]   { fill: #ffffff; }
  .canvas-light [fill="#1e293b"]   { fill: #f1f5f9; }
  @keyframes anim-spin { to { transform: rotate(360deg); } }
  @keyframes anim-sweep { 0%,100% { transform: rotate(12deg); } 50% { transform: rotate(-14deg); } }
  @keyframes anim-pulse { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
  @keyframes anim-belt { to { stroke-dashoffset: -24; } }
  @keyframes anim-cycle { 0%,27% { opacity: 1; } 33%,93% { opacity: .15; } 100% { opacity: 1; } }
  @keyframes anim-piston-move { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-16px); } }
  @keyframes anim-level-move { 0%,100% { transform: scaleY(1); } 50% { transform: scaleY(.5); } }
  .anim-cycle-1 { animation: anim-cycle 2.4s linear infinite; }
  .anim-cycle-2 { animation: anim-cycle 2.4s linear .8s infinite; opacity: .15; }
  .anim-cycle-3 { animation: anim-cycle 2.4s linear 1.6s infinite; opacity: .15; }
  .anim-piston { animation: anim-piston-move 1.6s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 50%; }
  .anim-level { animation: anim-level-move 3s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 100%; }
  @keyframes anim-charge1 { 0%,100% { opacity: .15; } 20%,90% { opacity: 1; } }
  @keyframes anim-charge2 { 0%,35%,100% { opacity: .15; } 55%,90% { opacity: 1; } }
  @keyframes anim-charge3 { 0%,65%,100% { opacity: .15; } 85%,90% { opacity: 1; } }
  @keyframes anim-toggle { 0%,40% { transform: rotate(0deg); } 50%,90% { transform: rotate(-16deg); } 100% { transform: rotate(0deg); } }
  @keyframes anim-glow-pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
  .anim-charge-1 { animation: anim-charge1 2.8s linear infinite; }
  .anim-charge-2 { animation: anim-charge2 2.8s linear infinite; }
  .anim-charge-3 { animation: anim-charge3 2.8s linear infinite; }
  .anim-relay-lever { animation: anim-toggle 2s ease-in-out infinite; transform-box: fill-box; transform-origin: 0% 100%; }
  .anim-spin-wind { animation: anim-spin 2.4s linear infinite; transform-box: fill-box; transform-origin: 50% 50%; }
  .anim-glow { animation: anim-glow-pulse 1.8s ease-in-out infinite; }
  .anim-spin { animation: anim-spin 1.2s linear infinite; transform-box: fill-box; transform-origin: 50% 50%; }
  .anim-spin-slow { animation: anim-spin 3s linear infinite; transform-box: fill-box; transform-origin: 50% 50%; }
  .anim-arm-upper { animation: anim-sweep 2.4s ease-in-out infinite; transform-box: fill-box; transform-origin: 0% 92%; }
  .anim-pulse { animation: anim-pulse 1s ease-in-out infinite; }
  .anim-pulse-alt { animation: anim-pulse 1s ease-in-out .5s infinite; }
  .anim-belt { animation: anim-belt 1s linear infinite; }
</style>
</head>
<body>
<div class="layout">
  <aside class="palette">
    <div class="logo-bar">
      <span style="font-size:14px;font-weight:700;color:#ececef;">Block Diagram Builder</span>
    </div>
    <button id="theme-toggle" style="width:100%;margin-bottom:8px;background:#26272d;color:#ececef;border:1px solid #34353c;border-radius:7px;padding:6px 10px;font-size:13px;cursor:pointer;">Dark canvas</button>
    <label id="wire-color-row" style="display:none;align-items:center;gap:8px;font-size:12px;color:#9b9ca4;margin-bottom:8px;">
      Wire color <input type="color" id="wire-color" value="#22d3ee" style="border:none;background:none;width:36px;height:24px;cursor:pointer;">
    </label>
    <button id="add-image" style="width:100%;margin-bottom:12px;background:#26272d;color:#ececef;border:1px solid #34353c;border-radius:7px;padding:6px 10px;font-size:13px;cursor:pointer;">Add image</button>
    <input type="file" id="image-file" accept="image/*" style="display:none;">
    <div class="tabs" id="palette-tabs"></div>
    <div id="palette-items"></div>
    <p class="hint">Drag a component onto the canvas. Drag from a small circle (pin) to another block to connect. Del removes the selection.</p>
  </aside>
  <div id="canvas"></div>
</div>

function partToMarkup(p) {
  return { tagName: p.tag, attrs: p.attrs, children: (p.children || []).map(partToMarkup) };
}
function partToSvg(p) {
  const a = Object.entries(p.attrs).map(([k, v]) => k + '="' + v + '"').join(' ');
  return p.children && p.children.length
    ? '<' + p.tag + ' ' + a + '>' + p.children.map(partToSvg).join('') + '</' + p.tag + '>'
    : '<' + p.tag + ' ' + a + '/>';
}

// White / dark canvas toggle (white by default)
let lightCanvas = true;
document.getElementById('canvas').classList.add('canvas-light');
document.getElementById('theme-toggle').addEventListener('click', (e) => {
  lightCanvas = !lightCanvas;
  document.getElementById('canvas').classList.toggle('canvas-light', lightCanvas);
  graph.drawBackground({ color: lightCanvas ? '#ffffff' : '#0f172a' });
  graph.drawGrid({ type: 'dot', args: { color: lightCanvas ? '#cbd5e1' : '#334155', thickness: 1 } });
  e.target.textContent = lightCanvas ? 'Dark canvas' : 'White canvas';
});
// Symbol drawings use fixed coordinates — scale the wrapper group on resize
graph.on('node:change:size', ({ node }) => {
  const def = SYMBOLS[node.shape] || ANIM[node.shape];
  if (!def) return;
  const s = node.getSize();
  node.attr('wrap/transform', 'scale(' + (s.width / def.width) + ',' + (s.height / def.height) + ')');
});

function makeNode(block, x, y) {
  if (block.shape) {
    return graph.addNode({
      shape: block.shape, x, y,
      attrs: { label: { text: block.label } },
    });
  }
  return graph.addNode({
    x, y, width: 140, height: 56,
    attrs: {
      body:  { fill: block.color, stroke: 'rgba(255,255,255,.4)', strokeWidth: 1.5, rx: 8, ry: 8 },
      label: { text: block.label, fill: '#fff', fontSize: 13, fontWeight: 600 },
    },
    ports: PORTS,
  });
}

// Palette: category tabs + native HTML5 drag-and-drop
const paletteEl = document.getElementById('palette-items');
const tabsEl = document.getElementById('palette-tabs');
const CATEGORIES = ['Blocks', 'Shapes', 'Electrical', 'Animated'];
let activeCategory = 'Blocks';

function categoryOf(b) {
  if (b.animated) return 'Animated';
  if (b.basic) return 'Shapes';
  if (b.shape) return 'Electrical';
  return 'Blocks';
}

function renderTabs() {
  tabsEl.innerHTML = '';
  CATEGORIES.forEach((cat) => {
    const t = document.createElement('button');
    t.className = 'tab' + (cat === activeCategory ? ' active' : '');
    t.textContent = cat;
    t.addEventListener('click', () => { activeCategory = cat; renderTabs(); renderPalette(); });
    tabsEl.appendChild(t);
  });
}

function renderPalette() {
  paletteEl.innerHTML = '';
  BLOCKS.filter((b) => categoryOf(b) === activeCategory).forEach((b) => {
    const el = document.createElement('div');
    el.className = 'palette-item';
    if (b.animated) {
      const def = ANIM[b.shape];
      el.innerHTML =
        '<svg viewBox="-4 -4 ' + (def.width + 8) + ' ' + (def.height + 8) + '" width="62" height="40">' +
        def.parts.map(partToSvg).join('') +
        '</svg><div style="font-size:10.5px;color:#9b9ca4;margin-top:4px">' + b.label + '</div>';
    } else if (b.basic) {
      const def = BASIC[b.shape];
      el.innerHTML =
        '<svg viewBox="0 0 60 40" width="62" height="40" fill="none" stroke="' + STROKE +
        '" stroke-width="2" stroke-linejoin="round">' + def.preview + '</svg>' +
        '<div style="font-size:10.5px;color:#9b9ca4;margin-top:4px">' + b.label + '</div>';
    } else if (b.shape) {
      const def = SYMBOLS[b.shape];
      el.innerHTML =
        '<svg viewBox="-4 -4 ' + (def.width + 8) + ' ' + (def.height + 8) + '" width="62" height="26">' +
        def.paths.map((p) =>
          '<path d="' + p.d + '" fill="' + (p.fill ? STROKE : 'none') + '" stroke="' + STROKE +
          '" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>').join('') +
        '</svg><div style="font-size:10.5px;color:#9b9ca4;margin-top:4px">' + b.label + '</div>';
    } else {
      el.classList.add('block-chip');
      el.style.background = b.color;
      el.textContent = b.label;
    }
    el.draggable = true;
    el.addEventListener('dragstart', (e) => e.dataTransfer.setData('text/plain', b.key));
    paletteEl.appendChild(el);
  });
}

renderTabs();
renderPalette();

const canvasEl = document.getElementById('canvas');
canvasEl.addEventListener('dragover', (e) => e.preventDefault());
canvasEl.addEventListener('drop', (e) => {
  e.preventDefault();
  const p = graph.clientToLocal(e.clientX, e.clientY);
  // image file dropped from the OS
  const file = Array.from(e.dataTransfer.files || []).find((f) => f.type.startsWith('image/'));
  if (file) { addImageNode(file, p.x, p.y); return; }
  const block = BLOCKS.find((b) => b.key === e.dataTransfer.getData('text/plain'));
  if (!block) return;
  makeNode(block, p.x - 70, p.y - 28);
});

// Image import (button or drag-drop above)
function addImageNode(file, cx, cy) {
  const reader = new FileReader();
  reader.onload = () => {
    const url = reader.result;
    const probe = new Image();
    probe.onload = () => {
      const max = 220;
      const scale = Math.min(1, max / Math.max(probe.width, probe.height));
      const w = Math.max(40, Math.round(probe.width * scale));
      const h = Math.max(40, Math.round(probe.height * scale));
      graph.addNode({
        shape: 'img-node',
        x: cx - w / 2, y: cy - h / 2, width: w, height: h,
        attrs: {
          img: { 'xlink:href': url },
          label: { text: file.name.replace(/\.[^.]+$/, '') },
        },
      });
    };
    probe.src = url;
  };
  reader.readAsDataURL(file);
}
const imageFileInput = document.getElementById('image-file');
document.getElementById('add-image').addEventListener('click', () => imageFileInput.click());
imageFileInput.addEventListener('change', () => {
  const file = imageFileInput.files[0];
  if (file) {
    const r = canvasEl.getBoundingClientRect();
    const p = graph.clientToLocal(r.left + r.width / 2, r.top + r.height / 2);
    addImageNode(file, p.x, p.y);
  }
  imageFileInput.value = '';
});

// Click to select, Del to remove; clicking a wire shows the color picker
let selected = null;
let selectedEdge = null;
const wireRow = document.getElementById('wire-color-row');
const wireColor = document.getElementById('wire-color');

function clearEdgeSel() {
  if (selectedEdge) selectedEdge.attr('line/strokeWidth', 2);
  selectedEdge = null;
  wireRow.style.display = 'none';
}
graph.on('node:click', ({ node }) => {
  if (selected) selected.attr('body/strokeWidth', 1.5);
  selected = node;
  node.attr('body/strokeWidth', 3);
  clearEdgeSel();
});
graph.on('edge:click', ({ edge }) => {
  if (selected) selected.attr('body/strokeWidth', 1.5);
  selected = null;
  if (selectedEdge) selectedEdge.attr('line/strokeWidth', 2);
  selectedEdge = edge;
  edge.attr('line/strokeWidth', 3.5);
  wireColor.value = edge.attr('line/stroke') || '#22d3ee';
  wireRow.style.display = 'flex';
});
graph.on('blank:click', () => {
  if (selected) selected.attr('body/strokeWidth', 1.5);
  selected = null;
  clearEdgeSel();
});
wireColor.addEventListener('input', () => {
  if (selectedEdge) selectedEdge.attr('line/stroke', wireColor.value);
});
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Delete' && e.key !== 'Backspace') return;
  if (selected) { graph.removeCell(selected); selected = null; }
  else if (selectedEdge) { graph.removeCell(selectedEdge); clearEdgeSel(); }
});
