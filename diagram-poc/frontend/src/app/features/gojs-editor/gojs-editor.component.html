<div class="gj-layout">
  <!-- Top bar -->
  <header class="gj-topbar">
    <div class="brand">
      <span class="brand-mark"><mat-icon>schema</mat-icon></span>
      <span class="brand-name">GoJS canvas</span>
    </div>
    <span class="tag">Preview</span>

    <input class="doc-name" [(ngModel)]="diagramName" placeholder="Diagram name" />

    <span class="spacer"></span>

    <div class="grp">
      <button mat-icon-button matTooltip="Undo" (click)="undo()"><mat-icon>undo</mat-icon></button>
      <button mat-icon-button matTooltip="Redo" (click)="redo()"><mat-icon>redo</mat-icon></button>
      <button mat-icon-button matTooltip="Zoom out" (click)="zoomOut()"><mat-icon>remove</mat-icon></button>
      <button mat-icon-button matTooltip="Fit" (click)="zoomToFit()"><mat-icon>fit_screen</mat-icon></button>
      <button mat-icon-button matTooltip="Zoom in" (click)="zoomIn()"><mat-icon>add</mat-icon></button>
    </div>
    <span class="vsep"></span>
    <button mat-icon-button matTooltip="New" (click)="newDiagram()"><mat-icon>note_add</mat-icon></button>
    <button mat-icon-button matTooltip="Import JSON" (click)="fileInput.click()"><mat-icon>upload</mat-icon></button>
    <button mat-icon-button matTooltip="Export JSON" (click)="exportJson()"><mat-icon>data_object</mat-icon></button>
    <button mat-icon-button matTooltip="Export PNG" (click)="exportPng()"><mat-icon>image</mat-icon></button>
    <input #fileInput type="file" accept=".json,application/json" hidden (change)="importJson($event)" />
    <span class="vsep"></span>
    <a class="x6-link" routerLink="/editor" matTooltip="Back to the classic (X6) editor">
      <mat-icon>arrow_back</mat-icon><span>Classic editor</span>
    </a>
  </header>

  <div class="gj-body">
    <!-- Palette -->
    <aside class="gj-palette">
      <div class="panel-title">Blocks</div>
      <div #palette class="palette-surface"></div>
      <p class="hint">Drag a block onto the canvas. Draw a link by dragging from one block's edge to another.</p>
    </aside>

    <!-- Canvas -->
    <main class="gj-canvas-wrap">
      <div #canvas class="gj-canvas"></div>
      <span class="gj-status" *ngIf="status">{{ status }}</span>
    </main>

    <!-- Properties -->
    <aside class="gj-props">
      <h3>Properties</h3>
      <p class="props-empty" *ngIf="!sel">Select a block to edit it.</p>
      <ng-container *ngIf="sel as s">
        <label><span>Label</span>
          <input [ngModel]="s.text" (ngModelChange)="setField('text', $event)" />
        </label>
        <label><span>Colour</span>
          <input type="color" [ngModel]="s.color" (ngModelChange)="setField('color', $event)" />
        </label>
        <button class="del-btn" (click)="deleteSelection()">
          <mat-icon>delete</mat-icon><span>Delete block</span>
        </button>
      </ng-container>
    </aside>
  </div>
</div>
