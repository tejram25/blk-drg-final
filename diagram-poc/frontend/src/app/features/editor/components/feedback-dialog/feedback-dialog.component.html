<div class="fb-backdrop" (click)="close.emit()">
  <div class="fb-card" (click)="$event.stopPropagation()">
    <div class="fb-head">
      <div>
        <h3 class="fb-title">Send feedback</h3>
        <span class="fb-sub">Help us close the loop on usability &amp; features</span>
      </div>
      <button type="button" class="fb-x" (click)="close.emit()"><mat-icon>close</mat-icon></button>
    </div>

    <div class="fb-body">
      <label class="fb-label">Category</label>
      <div class="fb-cats">
        @for (c of categories; track c) {
          <button type="button" class="fb-cat"
            [class.active]="category === c.key" (click)="category = c.key">
            {{ c.label }}
          </button>
        }
      </div>

      <label class="fb-label">How was your experience?</label>
      <div class="fb-stars">
        @for (s of stars; track s) {
          <button type="button" class="fb-star"
            [class.on]="s <= rating" (click)="rating = (rating === s ? 0 : s)"
            [attr.aria-label]="s + ' stars'">
            <mat-icon>{{ s <= rating ? 'star' : 'star_border' }}</mat-icon>
          </button>
        }
      </div>

      <label class="fb-label" for="fb-msg">Tell us more</label>
      <textarea id="fb-msg" class="fb-msg" rows="4" [(ngModel)]="message"
      placeholder="What worked well? What was confusing? What would you add?"></textarea>
    </div>

    <div class="fb-foot">
      <button type="button" class="fb-cancel" (click)="close.emit()">Cancel</button>
      <button type="button" class="fb-send" [disabled]="!canSubmit" (click)="submit()">
        {{ submitting ? 'Sending…' : 'Send feedback' }}
      </button>
    </div>
  </div>
</div>
