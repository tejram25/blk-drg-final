<div class="ver-backdrop" (click)="close.emit()">
  <div class="ver-card" (click)="$event.stopPropagation()">
    <div class="ver-head">
      <div>
        <h3 class="ver-title">Version history</h3>
        <span class="ver-sub">{{ diagramName }}</span>
      </div>
      <button type="button" class="ver-x" (click)="close.emit()"><mat-icon>close</mat-icon></button>
    </div>

    <div class="ver-save">
      <input type="text" [(ngModel)]="label" maxlength="80"
        placeholder="Label this snapshot (optional)…" (keyup.enter)="saveSnapshot()" />
      <button type="button" mat-flat-button class="ver-save-btn" [disabled]="saving" (click)="saveSnapshot()">
        <mat-icon>save</mat-icon> Save snapshot
      </button>
    </div>

    <div class="ver-body">
      @if (loading) {
        <p class="ver-loading">Loading…</p>
      }
      @if (!loading && !versions.length) {
        <p class="ver-empty">No snapshots yet — save one above.</p>
      }
      @for (v of versions; track v) {
        <div class="ver-row">
          <mat-icon class="ver-icon">history</mat-icon>
          <div class="ver-info">
            <span class="ver-label">{{ v.label }}</span>
            <span class="ver-meta">{{ v.authorName }} · {{ v.createdAt | date:'medium' }}</span>
          </div>
          <button type="button" mat-stroked-button (click)="restoreVersion(v)">Restore</button>
        </div>
      }
    </div>
  </div>
</div>
