<span class="stars" [class.sm]="size === 'sm'" [class.lg]="size === 'lg'">
  @for (s of stars; track s) {
    @if (!readonly) {
      <button type="button" class="star" [class.on]="s <= (hover || rating)"
        (click)="pick(s)" (mouseenter)="hover = s" (mouseleave)="hover = 0">
        <mat-icon>{{ icon(s) }}</mat-icon>
      </button>
    }
    @if (readonly) {
      <mat-icon class="star-icon">{{ icon(s) }}</mat-icon>
    }
  }
</span>
