<div class="confirm-backdrop" (click)="cancel.emit()">
  <div class="confirm-card" (click)="$event.stopPropagation()">
    <div class="confirm-icon" [class.danger]="danger"><mat-icon>warning</mat-icon></div>
    <h3 class="confirm-title">{{ title }}</h3>
    @if (message) {
      <p class="confirm-msg">{{ message }}</p>
    }
    <div class="confirm-actions">
      <button type="button" mat-stroked-button (click)="cancel.emit()">{{ cancelLabel }}</button>
      <button type="button" mat-flat-button [class.danger-btn]="danger" (click)="confirm.emit()">
        {{ confirmLabel }}
      </button>
    </div>
  </div>
</div>
