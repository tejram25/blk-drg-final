<div class="cp-backdrop" (click)="close.emit()">
  <div class="cp-panel" (click)="$event.stopPropagation()">
    <div class="cp-search">
      <mat-icon>search</mat-icon>
      <input #search type="text" [(ngModel)]="query" (ngModelChange)="onInput()"
             (keydown)="onKeydown($event)" placeholder="Type a command…" />
      <kbd>esc</kbd>
    </div>
    <ul class="cp-list">
      <li *ngFor="let cmd of filtered; let i = index" class="cp-item"
          [class.active]="i === selected"
          (mouseenter)="selected = i" (mousedown)="run(cmd)">
        <mat-icon class="cp-icon">{{ cmd.icon || 'chevron_right' }}</mat-icon>
        <span class="cp-label">{{ cmd.label }}</span>
        <span class="cp-hint" *ngIf="cmd.hint">{{ cmd.hint }}</span>
      </li>
      <li class="cp-empty" *ngIf="!filtered.length">No matching commands</li>
    </ul>
  </div>
</div>
