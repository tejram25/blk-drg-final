server.port=8080
# Listen on all interfaces so other machines on the LAN can reach the API
server.address=0.0.0.0

# File-based H2 so saved diagrams survive restarts (POC only)
spring.datasource.url=jdbc:h2:file:./data/diagrams;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Surface the reason from thrown errors (e.g. "Email already exists") in the JSON
# response body so the frontend can show a meaningful message.
server.error.include-message=always

# ---- Health / status (IT support ownership) ----
app.version=0.0.1
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ---- Auth session cookie ----
# Lax suits the same-origin setup (Angular dev proxy / reverse proxy). If you ever
# serve the frontend from a different origin over HTTPS, switch to: none (requires Secure).
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true
server.servlet.session.timeout=30m

# ---- Registration ----
# Registration is OPEN by default (anyone who can reach the app can create an account).
# To gate sign-ups, set a shared invite code below: registrants must enter this exact
# string. Leave it unset/empty for open registration.
#app.registration.invite-code=change-me-1234

# ---- Arrow Design Win Part Search API ----
# Credentials: set them either as environment variables (ARROW_CLIENT_ID /
# ARROW_CLIENT_SECRET) OR in a gitignored application-local.properties file
# (copy application-local.properties.example). NEVER put real secrets in this
# committed file. Leave unset to disable parts search (API returns 503).
spring.config.import=optional:classpath:application-local.properties
# Set arrow.mock=true to serve a small bundled sample catalogue instead of the
# live API (handy for trying the search -> part card -> BOM flow offline).
arrow.mock=${ARROW_MOCK:false}
arrow.base-url=https://qa-components-api-int.arrow.com
arrow.token-path=/auth/oauth2/token
arrow.search-path=/arrowapi/dw/partservice/search
arrow.version=v1
arrow.client-id=${ARROW_CLIENT_ID:}
arrow.client-secret=${ARROW_CLIENT_SECRET:}

# ---- AI recommendations (Claude / Anthropic) ----
# Set ANTHROPIC_API_KEY (env var or gitignored application-local.properties) to
# enable AI-generated recommendations. With no key, a deterministic rule-based
# engine is used so the feature works offline. NEVER commit a real key.
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.model=${ANTHROPIC_MODEL:claude-opus-4-8}

