server.port=8080
# Listen on all interfaces so other machines on the LAN can reach the API
server.address=0.0.0.0

# File-based H2 so saved diagrams survive restarts (POC only)
spring.datasource.url=jdbc:h2:file:./data/diagrams;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
# H2 web console is DISABLED by default — it allows arbitrary SQL and is a serious
# risk when the server is reachable (server.address=0.0.0.0). Enable only for local
# debugging via H2_CONSOLE_ENABLED=true.
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Surface the reason from thrown errors (e.g. "Email already exists") in the JSON
# response body so the frontend can show a meaningful message.
server.error.include-message=always

# ---- Health / status (IT support ownership) ----
app.version=0.0.1
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ---- Auth session cookie ----
# Lax suits the same-origin setup (Angular dev proxy / reverse proxy). If you ever
# serve the frontend from a different origin over HTTPS, switch to: none (requires Secure).
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true
server.servlet.session.timeout=30m

# ---- Registration ----
# Registration is OPEN by default (anyone who can reach the app can create an account).
# To gate sign-ups, set a shared invite code below: registrants must enter this exact
# string. Leave it unset/empty for open registration.
#app.registration.invite-code=change-me-1234

# ---- Arrow Design Win Part Search API ----
# Credentials: set them either as environment variables (ARROW_CLIENT_ID /
# ARROW_CLIENT_SECRET) OR in a gitignored application-local.properties file
# (copy application-local.properties.example). NEVER put real secrets in this
# committed file. Leave unset to disable parts search (API returns 503).
spring.config.import=optional:classpath:application-local.properties
# Set arrow.mock=true to serve a small bundled sample catalogue instead of the
# live API (handy for trying the search -> part card -> BOM flow offline).
arrow.mock=${ARROW_MOCK:false}
# Arrow APIM endpoints. Authentication is unchanged — set via env vars; the
# defaults below match the working configuration. The Design Win endpoints are
# served from the same host as part search (…/designwin).
arrow.auth-base-url=${ARROW_AUTH_BASE_URL:https://gc-api-dev-apimgwt.apps.usdenpos01.arrow.com}
arrow.search-base-url=${ARROW_SEARCH_BASE_URL:https://gc-apim-dev1.azure-api.net}
arrow.designwin-base-url=${ARROW_DESIGNWIN_BASE_URL:https://gc-apim-dev1.azure-api.net/designwin}
arrow.token-path=${ARROW_TOKEN_PATH:/auth/oauth2/token}
arrow.search-path=${ARROW_SEARCH_PATH:/arrowapi/dw/partservice/search}
arrow.app-id=${ARROW_APP_ID:gen}
# How many results to request per search (the API pages; default returns 1).
arrow.search-limit=${ARROW_SEARCH_LIMIT:25}
# Cross-check Design Win POS for "field-proven" status in recommendations. Set
# false where POS data isn't loaded (e.g. DEV) to skip the extra call per part.
recommendation.pos-check=${RECOMMENDATION_POS_CHECK:true}
arrow.version=${ARROW_VERSION:v1}
arrow.client-id=${ARROW_CLIENT_ID:}
arrow.client-secret=${ARROW_CLIENT_SECRET:}

# ---- AI recommendations (local Ollama) ----
# Runs a model on your own machine via Ollama (https://ollama.com) — no API key,
# no quota, no account, fully offline. Install Ollama, pull a model
# (e.g. `ollama pull llama3.2`), then set OLLAMA_ENABLED=true. When disabled, a
# deterministic rule-based engine is used so the feature works out of the box.
ollama.enabled=${OLLAMA_ENABLED:false}
ollama.model=${OLLAMA_MODEL:llama3.2}
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
# Vision model for image-to-diagram (pull e.g. `ollama pull llama3.2-vision`).
ollama.vision-model=${OLLAMA_VISION_MODEL:llama3.2-vision}

# Allow larger request bodies for base64 diagram images (image-to-diagram).
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=20MB


# ---- Logging ----
# INFO logs every outgoing Arrow API call (token + each GET). Set to DEBUG to also
# see token cache hits and per-lookup failures.
logging.level.com.example.diagram=${APP_LOG_LEVEL:INFO}
