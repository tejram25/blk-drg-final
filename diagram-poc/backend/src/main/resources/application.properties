# Bind to Heroku's assigned port ($PORT) in the cloud; 8080 locally.
server.port=${PORT:8080}
# Listen on all interfaces so other machines / the platform router can reach it.
server.address=0.0.0.0

# In-memory H2 — zero setup and works on Heroku's ephemeral filesystem. Data
# (accounts, saved diagrams) resets when the dyno restarts/redeploys; fine for a
# demo. Swap the URL for a persistent DB (e.g. Postgres) if you need durability.
spring.datasource.url=jdbc:h2:mem:diagrams;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
# H2 web console disabled by default (arbitrary SQL). Enable via H2_CONSOLE_ENABLED=true.
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Surface thrown error messages in the JSON body so the frontend can show them.
server.error.include-message=always

# ---- Health / status ----
app.version=0.0.1
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ---- Auth session cookie ----
# Lax works for same-origin/native use. Native apps (the APK) don't use cookies
# for CORS; if you serve a web build from a different HTTPS origin, use: none.
server.servlet.session.cookie.same-site=${SESSION_SAMESITE:lax}
server.servlet.session.cookie.http-only=true
server.servlet.session.timeout=30m

# ---- Registration ----
# Open by default. Set app.registration.invite-code to gate sign-ups.
#app.registration.invite-code=change-me-1234

# ---- Parts / Design-Win (offline) ----
# Part search and the Design-Win explorer always serve the bundled sample data
# (sample-parts.json / sample-designwin.json) — no external API, no credentials.
app.offline-mode=true
# Skip the Design-Win POS cross-check in recommendations (no live POS offline).
recommendation.pos-check=${RECOMMENDATION_POS_CHECK:false}

# ---- AI recommendations (optional local Ollama) ----
# Disabled by default: a deterministic rule-based engine is used, so AI features
# work with no key/account/quota. Set OLLAMA_ENABLED=true to use a local model.
ollama.enabled=${OLLAMA_ENABLED:false}
ollama.model=${OLLAMA_MODEL:llama3.2}
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.vision-model=${OLLAMA_VISION_MODEL:llama3.2-vision}

# Allow larger request bodies for base64 diagram images (image-to-diagram).
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=20MB

# ---- Logging ----
logging.level.com.example.diagram=${APP_LOG_LEVEL:INFO}
